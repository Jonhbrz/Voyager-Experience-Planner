name: vep-prod

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: app_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - vep_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_prod"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www
    ports:
      - "8001:8000"
    env_file:
      - prod.env
    entrypoint: ["/bin/sh", "-c"]

    command:
      - >-
        set -e;
        cd /var/www;
        php artisan migrate --force || true;
        php artisan config:cache || true;
        exec php artisan serve --host=0.0.0.0 --port=8000 --no-reload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:

      context: ./frontend
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package.json package-lock.json* ./
        RUN npm ci
        COPY . .
        ENV VITE_API_BASE_URL=http://localhost:8001/api
        RUN npm run build
        EXPOSE 5174
        CMD ["npm", "run", "preview", "--", "--host", "0.0.0.0", "--port", "5174"]
    ports:
      - "5174:5174"

volumes:
  vep_prod_pgdata:
