name: vep-dev

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: app_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
  
    ports:
      - "5434:5432"
    volumes:
      - vep_dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www

    ports:
      - "8002:8000"
    volumes:
      - ./backend:/var/www
      - vep_dev_vendor:/var/www/vendor
    env_file:
      - dev.env
    entrypoint: ["/bin/sh", "-c"]

    command:
      - >-
        set -e;
        cd /var/www;
        if [ ! -f "vendor/laravel/pail/src/PailServiceProvider.php" ]; then
          composer install --no-interaction --prefer-dist --optimize-autoloader;
        fi;
        php artisan migrate --force || true;
        exec php artisan serve --host=0.0.0.0 --port=8000 --no-reload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - vep_dev_node_modules:/app/node_modules
    environment:

      VITE_API_BASE_URL: http://localhost:8002/api
    command:
      - /bin/sh
      - -c
      - npm ci && npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend

volumes:
  vep_dev_pgdata:
  vep_dev_node_modules:
  vep_dev_vendor:
