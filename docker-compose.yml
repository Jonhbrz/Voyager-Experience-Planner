version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: vep_postgres
    restart: always
    environment:
      POSTGRES_DB: vep_db
      POSTGRES_USER: vep_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: