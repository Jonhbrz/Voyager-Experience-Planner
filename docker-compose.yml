version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: vep_postgres
    restart: always
    environment:
      POSTGRES_DB: vep_db
      POSTGRES_USER: vep_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: php:8.4-fpm
    container_name: vep_app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    container_name: vep_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  pgdata: