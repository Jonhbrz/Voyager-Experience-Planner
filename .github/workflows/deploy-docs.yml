# Despliega la documentación MkDocs en GitHub Pages (origen: GitHub Actions)
name: Deploy documentation

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set site_url for GitHub Pages (subruta /repo/)
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          python3 << 'PY'
          import os
          owner = os.environ["GITHUB_REPOSITORY_OWNER"]
          repo = os.environ["GITHUB_REPOSITORY"].split("/")[-1]
          owner_l = owner.lower()
          # Sitio de proyecto: /repo/  |  Sitio de usuario u org: repo == owner.github.io
          if repo.lower() == f"{owner_l}.github.io":
              site_url = f"https://{owner_l}.github.io/"
          else:
              site_url = f"https://{owner_l}.github.io/{repo}/"
          path = "mkdocs.yml"
          with open(path, encoding="utf-8") as f:
              text = f.read()
          if "site_url:" in text:
              print("mkdocs.yml ya define site_url; no se modifica.")
          else:
              lines = text.splitlines(keepends=True)
              out = []
              inserted = False
              for line in lines:
                  out.append(line)
                  if not inserted and line.strip().startswith("site_author:"):
                      out.append(f"site_url: {site_url}\n")
                      inserted = True
              if not inserted:
                  out.insert(0, f"site_url: {site_url}\n")
              with open(path, "w", encoding="utf-8") as f:
                  f.writelines(out)
              print(f"Añadido site_url: {site_url}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs and Material
        run: pip install "mkdocs>=1.6" "mkdocs-material>=9.5"

      - name: Build documentation
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
